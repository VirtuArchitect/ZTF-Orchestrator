name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # -- Python backend ----------------------------------------------------------
  python:
    name: Python tests & security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run tests and security scan
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e ZTF_STORAGE_BACKEND=file \
            -e ZTF_DATABASE_URL= \
            -e POSTGRES_PASSWORD= \
            python:3.11-slim \
            bash -lc '
              echo "::group::Install Python dependencies"
              pip install -r requirements.txt pytest pytest-cov pip-audit defusedxml
              echo "::endgroup::"
              echo "::group::Python vulnerability scan"
              # PYSEC-2024-271: log-injection via CRLF in flask-cors debug mode.
              # No fixed version exists in any flask-cors release. Risk is accepted:
              # the app binds to localhost only and debug logging is off by default.
              pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-271 \
                || { sleep 10; pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-271; }
              echo "::endgroup::"
              echo "::group::Pytest"
              set +e
              pytest tests/ -v --cov=server --cov-report=term-missing --cov-fail-under=70 --junitxml=pytest-results.xml
              status=$?
              if [ "$status" -ne 0 ]; then
                python .github/scripts/annotate_pytest_failures.py pytest-results.xml
              fi
              echo "::endgroup::"
              exit "$status"
            '

  # -- Frontend ---------------------------------------------------------------
  frontend:
    name: Frontend build & audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # -- Docker -----------------------------------------------------------------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [python, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -t ztf-orchestrator:${{ github.sha }} .

      - name: Smoke test
        run: |
          docker run -d --name smoke \
            -p 5001:5001 \
            -e ZTF_STORAGE_BACKEND=file \
            -e ZTF_BIND_HOST=0.0.0.0 \
            ztf-orchestrator:${{ github.sha }}
          for i in {1..12}; do
            if curl -fsS http://localhost:5001/health; then
              docker exec -w /opt/zerotouch-framework smoke \
                /opt/ztf-python/bin/python -c "import rainbow_logging_handler; import ntnx_iam_py_client; import scrypt; import framework.helpers.log_utils"
              docker exec -w /opt/zerotouch-framework smoke \
                /opt/ztf-python/bin/python main.py --help
              docker stop smoke
              exit 0
            fi
            docker logs smoke
            sleep 5
          done
          docker logs smoke
          docker stop smoke
          exit 1
