name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Python backend ───────────────────────────────────────────────────────────
  python:
    name: Python tests & security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov pip-audit

      - name: Vulnerability scan
        run: pip-audit -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --cov=server --cov-report=term-missing --cov-fail-under=70

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend build & audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Docker ───────────────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [python, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ztf-orchestrator:${{ github.sha }} .

      - name: Smoke test
        run: |
          docker run -d --name smoke -p 5001:5001 ztf-orchestrator:${{ github.sha }}
          sleep 5
          curl -f http://localhost:5001/health
          docker stop smoke
