name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # -- Python backend ----------------------------------------------------------
  python:
    name: Python tests & security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov pip-audit

      - name: Vulnerability scan
        # PYSEC-2024-271: log-injection via CRLF in flask-cors debug mode.
        # No fixed version exists in any flask-cors release. Risk is accepted:
        # the app binds to localhost only and debug logging is off by default.
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-271

      - name: Run tests
        env:
          ZTF_STORAGE_BACKEND: file
          ZTF_DATABASE_URL: ''
          POSTGRES_PASSWORD: ''
        run: pytest tests/ -v --cov=server --cov-report=term-missing --cov-fail-under=70

  # -- Frontend ---------------------------------------------------------------
  frontend:
    name: Frontend build & audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # -- Docker -----------------------------------------------------------------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [python, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -t ztf-orchestrator:${{ github.sha }} .

      - name: Smoke test
        run: |
          docker run -d --name smoke \
            -p 5001:5001 \
            -e ZTF_STORAGE_BACKEND=file \
            -e ZTF_BIND_HOST=0.0.0.0 \
            ztf-orchestrator:${{ github.sha }}
          for i in {1..12}; do
            if curl -fsS http://localhost:5001/health; then
              docker stop smoke
              exit 0
            fi
            docker logs smoke
            sleep 5
          done
          docker logs smoke
          docker stop smoke
          exit 1
