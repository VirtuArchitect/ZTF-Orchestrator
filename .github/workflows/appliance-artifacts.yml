name: Appliance Artifacts

on:
  workflow_dispatch:
  push:
    tags: [ "v*" ]

permissions:
  contents: read

jobs:
  package:
    name: Package appliance kit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate appliance Compose file
        run: |
          export POSTGRES_PASSWORD=ci-postgres-password
          export ZTF_DATABASE_URL=postgresql://ztf:ci-postgres-password@postgres:5432/ztf_orchestrator
          export ZTF_ORCHESTRATOR_VERSION=${GITHUB_REF_NAME:-latest}
          docker compose -f appliance/docker-compose.appliance.yml config

      - name: Package appliance directory
        run: |
          mkdir -p artifacts
          tar -czf artifacts/ztf-orchestrator-appliance-kit-${GITHUB_REF_NAME:-dev}.tar.gz appliance README.md .env.example

      - name: Upload appliance kit
        uses: actions/upload-artifact@v4
        with:
          name: ztf-orchestrator-appliance-kit
          path: artifacts/*.tar.gz
          if-no-files-found: error
