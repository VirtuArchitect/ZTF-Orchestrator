name: Build AHV Appliance Image

on:
  workflow_dispatch:
    inputs:
      artifact_profile:
        description: Appliance artifact profile to build
        required: false
        default: standard
        type: choice
        options:
          - standard
          - airgap
          - minimal
          - all
      source_ref:
        description: Git ref to bake into the appliance source checkout
        required: false
        default: main
      image_version:
        description: ZTF-Orchestrator container tag to preload and run
        required: false
        default: latest
      qemu_accelerator:
        description: QEMU accelerator to use; tcg works on GitHub-hosted runners
        required: false
        default: tcg
      qemu_binary:
        description: QEMU binary path or name used by Packer
        required: false
        default: /usr/bin/qemu-system-x86_64
      build_container_image:
        description: Build the ZTF-Orchestrator image inside the QCOW2 instead of relying on GHCR
        required: false
        default: "true"
      pull_container_images:
        description: Pull supporting container images into the QCOW2 when network is available
        required: false
        default: "true"
      ztf_framework_ref:
        description: ZeroTouch Framework 1.x ref to bake into the container image
        required: false
        default: v1.5.2
      bake_nkp_framework:
        description: Clone and bake the NKP ZeroTouch Framework into the appliance
        required: false
        default: "true"
      nkp_framework_ref:
        description: NKP ZeroTouch Framework ref to bake into the appliance
        required: false
        default: main
      nkp_bundle_urls:
        description: Optional comma-separated NKP bundle URLs to download into the appliance
        required: false
        default: ""
  push:
    tags: [ "v*" ]

permissions:
  contents: write
  actions: read

jobs:
  resolve-profiles:
    name: Resolve appliance profiles
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.profiles.outputs.matrix }}
    steps:
      - name: Select profiles
        id: profiles
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            selected="${{ inputs.artifact_profile }}"
          else
            selected="all"
          fi
          case "$selected" in
            standard)
              matrix='{"include":[{"profile":"standard","description":"Connected staging appliance with baked app image, PostgreSQL image, ZTF v1.5.2, and NKP framework.","build_container_image":"true","pull_container_images":"true","bake_nkp_framework":"true"}]}'
              ;;
            airgap)
              matrix='{"include":[{"profile":"airgap","description":"Portable disconnected-site appliance with baked app image, PostgreSQL image, ZTF v1.5.2, and NKP framework.","build_container_image":"true","pull_container_images":"true","bake_nkp_framework":"true"}]}'
              ;;
            minimal)
              matrix='{"include":[{"profile":"minimal","description":"Smaller bootstrap appliance that defers app/support image pulls and NKP framework staging to first boot or site process.","build_container_image":"false","pull_container_images":"false","bake_nkp_framework":"false"}]}'
              ;;
            all)
              matrix='{"include":[{"profile":"standard","description":"Connected staging appliance with baked app image, PostgreSQL image, ZTF v1.5.2, and NKP framework.","build_container_image":"true","pull_container_images":"true","bake_nkp_framework":"true"},{"profile":"airgap","description":"Portable disconnected-site appliance with baked app image, PostgreSQL image, ZTF v1.5.2, and NKP framework.","build_container_image":"true","pull_container_images":"true","bake_nkp_framework":"true"},{"profile":"minimal","description":"Smaller bootstrap appliance that defers app/support image pulls and NKP framework staging to first boot or site process.","build_container_image":"false","pull_container_images":"false","bake_nkp_framework":"false"}]}'
              ;;
            *)
              echo "Unsupported artifact_profile: $selected" >&2
              exit 1
              ;;
          esac
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build-qcow2:
    name: Build AHV QCOW2 (${{ matrix.profile }})
    needs: resolve-profiles
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-profiles.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve build inputs
        id: vars
        run: |
          profile="${{ matrix.profile }}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            source_ref="${{ inputs.source_ref }}"
            image_version="${{ inputs.image_version }}"
            qemu_accelerator="${{ inputs.qemu_accelerator }}"
            qemu_binary="${{ inputs.qemu_binary }}"
            ztf_framework_ref="${{ inputs.ztf_framework_ref }}"
            nkp_framework_ref="${{ inputs.nkp_framework_ref }}"
            nkp_bundle_urls="${{ inputs.nkp_bundle_urls }}"
          else
            source_ref="${GITHUB_REF_NAME}"
            image_version="${GITHUB_REF_NAME}"
            qemu_accelerator="tcg"
            qemu_binary="/usr/bin/qemu-system-x86_64"
            ztf_framework_ref="v1.5.2"
            nkp_framework_ref="main"
            nkp_bundle_urls=""
          fi
          build_container_image="${{ matrix.build_container_image }}"
          pull_container_images="${{ matrix.pull_container_images }}"
          bake_nkp_framework="${{ matrix.bake_nkp_framework }}"
          if [ "$profile" = "standard" ] && [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${{ inputs.artifact_profile }}" != "all" ]; then
            build_container_image="${{ inputs.build_container_image }}"
            pull_container_images="${{ inputs.pull_container_images }}"
            bake_nkp_framework="${{ inputs.bake_nkp_framework }}"
          fi
          artifact_suffix="${profile}-${source_ref}"
          echo "profile=${profile}" >> "$GITHUB_OUTPUT"
          echo "profile_description=${{ matrix.description }}" >> "$GITHUB_OUTPUT"
          echo "source_ref=${source_ref}" >> "$GITHUB_OUTPUT"
          echo "image_version=${image_version}" >> "$GITHUB_OUTPUT"
          echo "qemu_accelerator=${qemu_accelerator}" >> "$GITHUB_OUTPUT"
          echo "qemu_binary=${qemu_binary}" >> "$GITHUB_OUTPUT"
          echo "build_container_image=${build_container_image}" >> "$GITHUB_OUTPUT"
          echo "pull_container_images=${pull_container_images}" >> "$GITHUB_OUTPUT"
          echo "ztf_framework_ref=${ztf_framework_ref}" >> "$GITHUB_OUTPUT"
          echo "bake_nkp_framework=${bake_nkp_framework}" >> "$GITHUB_OUTPUT"
          echo "nkp_framework_ref=${nkp_framework_ref}" >> "$GITHUB_OUTPUT"
          echo "nkp_bundle_urls=${nkp_bundle_urls}" >> "$GITHUB_OUTPUT"
          echo "artifact_suffix=${artifact_suffix}" >> "$GITHUB_OUTPUT"

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils qemu-kvm xorriso

      - name: Verify QEMU and Packer inputs
        run: |
          set -eux
          command -v "${{ steps.vars.outputs.qemu_binary }}"
          "${{ steps.vars.outputs.qemu_binary }}" --version
          qemu-img --version
          xorriso -version
          ls -la /usr/bin/qemu-system-* || true

      - name: Set up Packer
        uses: hashicorp/setup-packer@v3
        with:
          version: latest

      - name: Generate Packer SSH key
        id: packer_ssh
        run: |
          set -eu
          key_path="${GITHUB_WORKSPACE}/appliance/packer/packer-build-key"
          ssh-keygen -t ed25519 -N "" -f "$key_path" -C "ztf-orchestrator-packer"
          chmod 600 "$key_path"
          echo "private_key_file=$key_path" >> "$GITHUB_OUTPUT"
          echo "public_key=$(cat "$key_path.pub")" >> "$GITHUB_OUTPUT"

      - name: Initialize Packer
        working-directory: appliance/packer
        run: packer init ahv-qcow2.pkr.hcl

      - name: Validate Packer template
        working-directory: appliance/packer
        run: |
          packer validate \
            -var "version=${{ steps.vars.outputs.source_ref }}" \
            -var "image_label=${{ steps.vars.outputs.artifact_suffix }}" \
            -var "ztf_orchestrator_version=${{ steps.vars.outputs.image_version }}" \
            -var "qemu_accelerator=${{ steps.vars.outputs.qemu_accelerator }}" \
            -var "qemu_binary=${{ steps.vars.outputs.qemu_binary }}" \
            -var "build_container_image=${{ steps.vars.outputs.build_container_image }}" \
            -var "pull_container_images=${{ steps.vars.outputs.pull_container_images }}" \
            -var "ztf_framework_ref=${{ steps.vars.outputs.ztf_framework_ref }}" \
            -var "bake_nkp_framework=${{ steps.vars.outputs.bake_nkp_framework }}" \
            -var "nkp_framework_ref=${{ steps.vars.outputs.nkp_framework_ref }}" \
            -var "nkp_bundle_urls=${{ steps.vars.outputs.nkp_bundle_urls }}" \
            -var "packer_ssh_private_key_file=${{ steps.packer_ssh.outputs.private_key_file }}" \
            -var "packer_ssh_public_key=${{ steps.packer_ssh.outputs.public_key }}" \
            ahv-qcow2.pkr.hcl

      - name: Build AHV QCOW2
        working-directory: appliance/packer
        env:
          PACKER_LOG: "1"
          PACKER_LOG_PATH: packer-debug.log
        run: |
          packer build \
            -var "version=${{ steps.vars.outputs.source_ref }}" \
            -var "image_label=${{ steps.vars.outputs.artifact_suffix }}" \
            -var "ztf_orchestrator_version=${{ steps.vars.outputs.image_version }}" \
            -var "qemu_accelerator=${{ steps.vars.outputs.qemu_accelerator }}" \
            -var "qemu_binary=${{ steps.vars.outputs.qemu_binary }}" \
            -var "build_container_image=${{ steps.vars.outputs.build_container_image }}" \
            -var "pull_container_images=${{ steps.vars.outputs.pull_container_images }}" \
            -var "ztf_framework_ref=${{ steps.vars.outputs.ztf_framework_ref }}" \
            -var "bake_nkp_framework=${{ steps.vars.outputs.bake_nkp_framework }}" \
            -var "nkp_framework_ref=${{ steps.vars.outputs.nkp_framework_ref }}" \
            -var "nkp_bundle_urls=${{ steps.vars.outputs.nkp_bundle_urls }}" \
            -var "packer_ssh_private_key_file=${{ steps.packer_ssh.outputs.private_key_file }}" \
            -var "packer_ssh_public_key=${{ steps.packer_ssh.outputs.public_key }}" \
            ahv-qcow2.pkr.hcl

      - name: Collect Packer failure diagnostics
        if: failure()
        working-directory: appliance/packer
        run: |
          mkdir -p diagnostics
          cp packer-debug.log diagnostics/packer-debug.log 2>/dev/null || true
          {
            echo "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "Ref: $GITHUB_REF"
            echo "SHA: $GITHUB_SHA"
            echo "UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "QEMU:"
            command -v "${{ steps.vars.outputs.qemu_binary }}" || true
            "${{ steps.vars.outputs.qemu_binary }}" --version || true
            qemu-img --version || true
            echo
            echo "Packer:"
            packer version || true
            echo
            echo "Output directory:"
            find output -maxdepth 2 -type f -printf '%p %s bytes\n' 2>/dev/null || true
          } > diagnostics/build-context.txt

      - name: Upload Packer failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ztf-orchestrator-ahv-qcow2-diagnostics-${{ steps.vars.outputs.artifact_suffix }}
          path: appliance/packer/diagnostics/
          if-no-files-found: warn

      - name: Package image checksum
        working-directory: appliance/packer
        run: |
          sha256sum output/*.qcow2 > "output/SHA256SUMS-${{ steps.vars.outputs.artifact_suffix }}.txt"

      - name: Upload QCOW2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ztf-orchestrator-ahv-qcow2-${{ steps.vars.outputs.artifact_suffix }}
          path: |
            appliance/packer/output/*.qcow2
            appliance/packer/output/SHA256SUMS-*.txt
          if-no-files-found: error

      - name: Upload release metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: ztf-orchestrator-ahv-qcow2-metadata-${{ steps.vars.outputs.artifact_suffix }}
          path: appliance/packer/output/SHA256SUMS-*.txt
          if-no-files-found: error

  publish-release:
    name: Publish AHV release metadata
    needs: build-qcow2
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download release metadata artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ztf-orchestrator-ahv-qcow2-metadata-*
          path: release-assets
          merge-multiple: true

      - name: Build release manifest
        run: |
          {
            echo "# ZTF-Orchestrator AHV Appliance Artifacts"
            echo
            echo "Release: ${GITHUB_REF_NAME}"
            echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "QCOW2 images are published as GitHub Actions artifacts because GitHub Release assets have a 2 GiB per-file limit."
            echo "Download the required artifact from the workflow run above, then verify it with the matching SHA256SUMS file."
            echo
            echo "## Files"
            find release-assets -type f -printf '- %f (%s bytes)\n' | sort
            echo
            echo "## QCOW2 Artifact Names"
            find release-assets -type f -name 'SHA256SUMS-*.txt' -printf '%f\n' \
              | sed -E 's/^SHA256SUMS-(.*)\.txt$/- ztf-orchestrator-ahv-qcow2-\1/' \
              | sort
          } > "release-assets/AHV-APPLIANCE-ARTIFACTS-${GITHUB_REF_NAME}.md"

      - name: Attach appliance metadata to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/SHA256SUMS-*.txt
            release-assets/AHV-APPLIANCE-ARTIFACTS-*.md
