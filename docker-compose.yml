# ── ZTF-Orchestrator — all-in-one deployment ──────────────────────────────────
#
# ZeroTouch Framework is baked into the image at build time.
# PostgreSQL is the default state backend for users, sessions, history, schedules,
# approvals, drift data, and audit events.
#
# Quick start:
#   docker compose up -d
#   docker compose logs -f          # copy admin password on first run
#   open http://localhost:5001
#
# Build args (override for internal mirrors / specific ZTF version):
#   docker compose build \
#     --build-arg ZTF_REPO_URL=https://gitea.internal/ztf.git \
#     --build-arg ZTF_REF=v2.1.0

services:
  ztf-orchestrator:
    build:
      context: .
      args:
        ZTF_REPO_URL: ${ZTF_REPO_URL:-https://github.com/nutanixdev/zerotouch-framework.git}
        ZTF_REF:      ${ZTF_REF:-main}
    image: ztf-orchestrator:latest
    container_name: ztf-orchestrator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:5001:5001"   # localhost only — put nginx in front for TLS
    volumes:
      - ztf-data:/var/lib/ztf-orchestrator   # users, history, configs, logs, pipelines
      - ztf-logs:/var/log/ztf-orchestrator
    environment:
      ZTF_DATA_DIR:       /var/lib/ztf-orchestrator
      ZTF_PATH:           /opt/zerotouch-framework
      ZTF_PORT:           "5001"
      ZTF_BIND_HOST:      "0.0.0.0"
      ZTF_LOG_LEVEL:      ${ZTF_LOG_LEVEL:-INFO}
      ZTF_EXEC_TIMEOUT:   ${ZTF_EXEC_TIMEOUT:-3600}
      ZTF_EXEC_WORKERS:   ${ZTF_EXEC_WORKERS:-1}
      ZTF_TOKEN_TTL:      ${ZTF_TOKEN_TTL:-28800}
      ZTF_CONFIG_BACKUPS: ${ZTF_CONFIG_BACKUPS:-5}
      ZTF_STORAGE_BACKEND: ${ZTF_STORAGE_BACKEND:-postgres}
      ZTF_DATABASE_URL:   ${ZTF_DATABASE_URL:-postgresql://ztf:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/ztf_orchestrator}
      ZTF_AUDIT_RETENTION_DAYS: ${ZTF_AUDIT_RETENTION_DAYS:-90}
      ZTF_EXECUTION_RETENTION_DAYS: ${ZTF_EXECUTION_RETENTION_DAYS:-180}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  postgres:
    image: postgres:16-alpine
    container_name: ztf-orchestrator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ztf_orchestrator
      POSTGRES_USER: ztf
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - ztf-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ztf -d ztf_orchestrator"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  ztf-data:
  ztf-logs:
  ztf-postgres:
