apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ztf-orchestrator-data
  namespace: ztf-orchestrator
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ztf-orchestrator
  namespace: ztf-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ztf-orchestrator
  template:
    metadata:
      labels:
        app: ztf-orchestrator
    spec:
      containers:
        - name: ztf-orchestrator
          image: ztf-orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
              name: http
          envFrom:
            - configMapRef:
                name: ztf-orchestrator-config
          env:
            - name: ZTF_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ztf-orchestrator-secrets
                  key: ZTF_DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/ztf-orchestrator
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ztf-orchestrator-data
